<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">15-minute inspection map</title>
  <desc id="desc">A visual checklist showing the order to inspect a used vehicle before buying.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#061014"/>
      <stop offset="0.56" stop-color="#0d1b23"/>
      <stop offset="1" stop-color="#101820"/>
    </linearGradient>
    <style>
      .label{font:700 23px 'IBM Plex Mono',Consolas,monospace;letter-spacing:2px;fill:#e9fbff}
      .small{font:600 18px 'IBM Plex Mono',Consolas,monospace;letter-spacing:1px;fill:#95eaff}
      .body{font:600 19px Inter,Arial,sans-serif;fill:#dff5fa}
      .line{stroke:#8ee7ff;stroke-width:3;stroke-linecap:round;stroke-dasharray:8 10}
      .node{fill:#e43f35;stroke:#fff;stroke-width:4}
    </style>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <path d="M120 120h960v480H120z" fill="none" stroke="#8ee7ff" stroke-opacity=".24" stroke-width="2"/>
  <path d="M270 210h660c40 0 82 48 92 112l18 112c7 43-26 76-68 76H228c-42 0-75-33-68-76l18-112c10-64 52-112 92-112z" fill="#172832" stroke="#8ee7ff" stroke-opacity=".42" stroke-width="4"/>
  <path d="M330 230h540l66 138H264z" fill="#203844" stroke="#8ee7ff" stroke-opacity=".26" stroke-width="3"/>
  <circle cx="310" cy="522" r="62" fill="#050b0e" stroke="#8ee7ff" stroke-opacity=".48" stroke-width="8"/>
  <circle cx="890" cy="522" r="62" fill="#050b0e" stroke="#8ee7ff" stroke-opacity=".48" stroke-width="8"/>
  <circle class="node" cx="240" cy="170" r="28"/><text x="231" y="179" class="label">1</text>
  <circle class="node" cx="955" cy="178" r="28"/><text x="946" y="187" class="label">2</text>
  <circle class="node" cx="1020" cy="392" r="28"/><text x="1011" y="401" class="label">3</text>
  <circle class="node" cx="898" cy="606" r="28"/><text x="889" y="615" class="label">4</text>
  <circle class="node" cx="310" cy="606" r="28"/><text x="301" y="615" class="label">5</text>
  <circle class="node" cx="160" cy="390" r="28"/><text x="151" y="399" class="label">6</text>
  <path class="line" d="M268 170h659M955 207l60 157M999 415l-82 168M870 606H338M286 586L172 416M164 362l62-164"/>
  <text x="68" y="62" class="small">GRAPHIC 01 / BUYER WALKAROUND</text>
  <text x="68" y="675" class="body">1 paint + panel gaps  2 glass + lights  3 spare/tire kit  4 tire date + wear  5 leaks + suspension  6 battery + warning lights</text>
</svg>
