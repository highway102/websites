  <path d="M273 191l-55 96h350l-89-96" class="line"/>
  <circle cx="236" cy="365" r="49" fill="#071016" stroke="#8ee7ff" stroke-width="10"/>
  <circle cx="585" cy="365" r="49" fill="#071016" stroke="#8ee7ff" stroke-width="10"/>
  <path d="M692 143a84 84 0 1 1-48 152" class="thin"/>
  <path d="M697 171a56 56 0 1 1-33 101" class="thin"/>
  <path d="M692 227l66-44" class="line"/>
  <circle cx="692" cy="227" r="12" class="red"/>
