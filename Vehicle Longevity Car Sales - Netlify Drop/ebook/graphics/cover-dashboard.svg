<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img" aria-labelledby="title desc">
  <title id="title">Vehicle repairability dashboard graphic</title>
  <desc id="desc">A clean automotive dashboard graphic with a vehicle outline, repairability gauge, and ownership checklist bars.</desc>
  <defs>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0c2029"/>
      <stop offset="1" stop-color="#101820"/>
    </linearGradient>
    <style>
      .line{fill:none;stroke:#8ee7ff;stroke-width:8;stroke-linecap:round;stroke-linejoin:round}
      .thin{fill:none;stroke:#8ee7ff;stroke-width:3;stroke-linecap:round;stroke-opacity:.48}
      .soft{fill:#8ee7ff;opacity:.14}
      .red{fill:#e64338}
      .text{font:700 30px 'IBM Plex Mono',Consolas,monospace;letter-spacing:4px;fill:#dff8ff}
      .small{font:700 20px 'IBM Plex Mono',Consolas,monospace;letter-spacing:2px;fill:#8ee7ff}
    </style>
  </defs>
  <rect width="900" height="520" rx="28" fill="url(#panel)"/>
  <path d="M70 70h760v380H70z" class="thin"/>
